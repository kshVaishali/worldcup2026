function computeStandings(group, scores) {
  const teams = GROUPS[group];
  const tbl = {};
  teams.forEach(t => { tbl[t]={team:t,p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}; });
  GROUP_FIXTURES.filter(m=>m.group===group).forEach(m=>{
    const s = scores[m.id];
    if (!s || s.h==null) return;
    const H=tbl[m.home], A=tbl[m.away];
    H.p++; A.p++; H.gf+=s.h; H.ga+=s.a; H.gd+=(s.h-s.a);
    A.gf+=s.a; A.ga+=s.h; A.gd+=(s.a-s.h);
    if(s.h>s.a){H.w++;H.pts+=3;A.l++;}
    else if(s.h<s.a){A.w++;A.pts+=3;H.l++;}
    else{H.d++;H.pts++;A.d++;A.pts++;}
  });
  return Object.values(tbl).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}

function getAllStandings(scores) {
  const result = {};
  "ABCDEFGHIJKL".split("").forEach(g=>{ result[g]=computeStandings(g,scores); });
  return result;
}

// Figure out predicted bracket teams from standings
function predictKO(scores) {
  const st = getAllStandings(scores);
  // Collect all 3rd place teams and their stats to rank them
  const thirds = "ABCDEFGHIJKL".split("").map(g=>{
    const row = st[g][2];
    return row ? {...row, group:g} : {team:null,pts:0,gd:0,gf:0,group:g};
  }).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  const best8 = thirds.slice(0,8).map(t=>t.team);

  const w = (g,pos) => st[g]?.[pos]?.team || null;
  return {
    // map slot labels to predicted teams
    "1st A":w("A",0),"2nd A":w("A",1),
    "1st B":w("B",0),"2nd B":w("B",1),
    "1st C":w("C",0),"2nd C":w("C",1),
    "1st D":w("D",0),"2nd D":w("D",1),
    "1st E":w("E",0),"2nd E":w("E",1),
    "1st F":w("F",0),"2nd F":w("F",1),
    "1st G":w("G",0),"2nd G":w("G",1),
    "1st H":w("H",0),"2nd H":w("H",1),
    "1st I":w("I",0),"2nd I":w("I",1),
    "1st J":w("J",0),"2nd J":w("J",1),
    "1st K":w("K",0),"2nd K":w("K",1),
    "1st L":w("L",0),"2nd L":w("L",1),
    "Best 3rd ABCDF": best8[0]||null,
    "Best 3rd CDFGH": best8[1]||null,
    "Best 3rd CEFHI": best8[2]||null,
    "Best 3rd EHIJK": best8[3]||null,
    "Best 3rd BEFIJ": best8[4]||null,
    "Best 3rd AEHIJ": best8[5]||null,
    "Best 3rd EFGIJ": best8[6]||null,
    "Best 3rd DEIJL": best8[7]||null,
  };
}

function normalizeTeamName(name) {
  if (!name) return "";
  const key = String(name)
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/&/g, "and")
    .replace(/[^a-z0-9]+/g, " ")
    .trim();
  return TEAM_ALIASES[key] || String(name).trim();
}

function findFixtureByTeams(home, away) {
  const h = normalizeTeamName(home);
  const a = normalizeTeamName(away);
  return GROUP_FIXTURES.find(m =>
    normalizeTeamName(m.home) === h && normalizeTeamName(m.away) === a
  ) || GROUP_FIXTURES.find(m =>
    // Some feeds occasionally reverse team order. Only use this as a fallback.
    normalizeTeamName(m.home) === a && normalizeTeamName(m.away) === h
  );
}

function formatLastSync(ts) {
  if (!ts) return "Never synced";
  try { return `Last synced ${new Date(ts).toLocaleString()}`; }
  catch { return "Last sync time unavailable"; }
}

const C = { // color tokens — light theme
  bg:"#f5f4f0", card:"#ffffff", border:"#ddd9d0", borderLight:"#e8e4dc",
  text:"#1a1a1a", muted:"#888", dim:"#bbb",

  accent:"#1a1a1a",
};

function useIsMobile() {
  const [isMobile, setIsMobile] = useState(() => window.innerWidth <= 700);
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth <= 700);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return isMobile;
}

const inp = {
  width:36, padding:"3px 4px", borderRadius:4,
  border:`1px solid ${C.border}`, background:"#fff",
  color:C.text, textAlign:"center", fontSize:13,
  fontFamily:"inherit",
};

function ScoreCell({matchId, scores, onSave, compact=false}) {
  const isMobile = useIsMobile();
  const s = scores[matchId];
  const done = s && s.h != null;
  const [open, setOpen] = useState(false);
  const [h, setH] = useState(done ? String(s.h) : "");
  const [a, setA] = useState(done ? String(s.a) : "");

  useEffect(()=>{
    if(done){setH(String(s.h));setA(String(s.a));}
  },[done, s?.h, s?.a]);

  function save(){
    const hv=parseInt(h), av=parseInt(a);
    if(!isNaN(hv)&&!isNaN(av)&&hv>=0&&av>=0){ onSave(matchId,hv,av); setOpen(false); }
  }
  function clear(){ onSave(matchId,null,null); setH(""); setA(""); setOpen(false); }

  if(!open){
    if(done){
      return(
        <button onClick={()=>setOpen(true)} style={{
          background:C.greenDim, border:`1px solid ${C.green}`,
          color:C.greenBright, borderRadius:6, padding:isMobile?"8px 12px":"2px 8px",
          cursor:"pointer", fontSize:isMobile?14:(compact?12:13), fontWeight:700, fontFamily:"inherit",
          letterSpacing:"0.05em", minWidth:isMobile?58:(compact?44:52),
        }}>{s.h}–{s.a}</button>
      );
    }
    return(
      <button onClick={()=>setOpen(true)} style={{
        background:"transparent", border:`1px solid ${C.border}`,
        color:C.dim, borderRadius:6, padding:isMobile?"8px 12px":"2px 8px",
        cursor:"pointer", fontSize:isMobile?14:12, fontFamily:"inherit", minWidth:isMobile?58:(compact?44:52),
      }}>_ – _</button>
    );
  }
  return(
    <span style={{display:"flex",gap:isMobile?6:3,alignItems:"center",flexWrap:"wrap"}}>
      <input value={h} onChange={e=>setH(e.target.value)} style={{...inp,width:isMobile?46:36,padding:isMobile?"8px 4px":"3px 4px"}} type="number" min="0"/>
      <span style={{color:C.muted,fontSize:12}}>–</span>
      <input value={a} onChange={e=>setA(e.target.value)} style={{...inp,width:isMobile?46:36,padding:isMobile?"8px 4px":"3px 4px"}} type="number" min="0"/>
      <button onClick={save} style={{background:C.green,color:"#fff",border:"none",borderRadius:4,padding:isMobile?"8px 10px":"3px 6px",cursor:"pointer",fontSize:isMobile?14:12,fontWeight:700}}>✓</button>
      {done&&<button onClick={clear} style={{background:"#fee2e2",color:C.red,border:"none",borderRadius:4,padding:isMobile?"8px 10px":"3px 5px",cursor:"pointer",fontSize:isMobile?13:11}}>✕</button>}
      <button onClick={()=>setOpen(false)} style={{background:C.card,color:C.muted,border:`1px solid ${C.border}`,borderRadius:4,padding:isMobile?"8px 10px":"3px 5px",cursor:"pointer",fontSize:isMobile?13:11}}>↩</button>
    </span>
  );
}

// Parse "3:00 PM" / "12:00 AM" into minutes-since-midnight for sorting.
// 12:00 AM is treated as 24*60 so late-night games sort after evening ones.
function parseTime(t) {
  const [hhmm, ampm] = t.split(" ");
  let [h, m] = hhmm.split(":").map(Number);
  if (ampm === "PM" && h !== 12) h += 12;
  if (ampm === "AM" && h === 12) h = 24;
  return h * 60 + m;
}

// Canonical date order so sorting works correctly (Jun 11 … Jun 27)
const DATE_ORDER = [
  "Jun 11","Jun 12","Jun 13","Jun 14","Jun 15","Jun 16","Jun 17",
  "Jun 18","Jun 19","Jun 20","Jun 21","Jun 22","Jun 23","Jun 24",
  "Jun 25","Jun 26","Jun 27",
];

// All group fixtures sorted strictly by date then time
const FIXTURES_SORTED = [...GROUP_FIXTURES].sort((a,b)=>{
  const di = DATE_ORDER.indexOf(a.date) - DATE_ORDER.indexOf(b.date);
  return di !== 0 ? di : parseTime(a.time) - parseTime(b.time);
});

// Build ordered byDate map from the sorted list
function buildByDate() {
  const map = {};
  FIXTURES_SORTED.forEach(m => {
    if (!map[m.date]) map[m.date] = [];
    map[m.date].push(m);
  });
  return map;
}

// ── Calendar: mini month grid + day detail ────────────────────
// Calendar weeks are displayed Monday → Sunday.
// JavaScript Date.getDay() returns Sunday=0, Monday=1, etc., so convert it to Monday=0.
function mondayFirstOffset(year, monthIndex) {
  return (new Date(year, monthIndex, 1).getDay() + 6) % 7;
}

function getTodayTournamentLabel() {
  const now = new Date();
  if (now.getFullYear() !== 2026) return "Jun 11";
  const month = now.toLocaleString("en-US", { month: "short" });
  if (month !== "Jun" && month !== "Jul") return "Jun 11";
  return `${month} ${now.getDate()}`;
}

function CalendarTab({scores, onSave}) {
  const byDate = buildByDate();
  const matchDates = new Set(Object.keys(byDate));
  const todayLabel = getTodayTournamentLabel();
  const [selectedDate, setSelectedDate] = useState(matchDates.has(todayLabel) ? todayLabel : "Jun 11");

  // Build calendar grids for June and July (up to Jul 19)
  function MonthGrid({monthName, year, numDays, monthIndex, prefix}) {
    const firstDow = mondayFirstOffset(year, monthIndex);
    const cells = [];
    for (let i = 0; i < firstDow; i++) cells.push(null);
    for (let d = 1; d <= numDays; d++) cells.push(d);

    return (
      <div style={{flex:1, minWidth:useIsMobile()?"100%":260}}>
        <div style={{
          textAlign:"center", fontWeight:800, fontSize:12,
          color:C.gold, letterSpacing:"0.1em",
          marginBottom:8, padding:"4px 0",
        }}>{monthName.toUpperCase()} {year}</div>
        <div style={{display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2, marginBottom:6}}>
          {["Mo","Tu","We","Th","Fr","Sa","Su"].map(d=>(
            <div key={d} style={{textAlign:"center",fontSize:10,color:C.muted,fontWeight:700,padding:"2px 0"}}>{d}</div>
          ))}
          {cells.map((day,i) => {
            if (!day) return <div key={`e${i}`}/>;
            const label = `${prefix} ${day}`;
            const hasMatches = matchDates.has(label);
            const played = hasMatches && byDate[label].every(m=>scores[m.id]?.h!=null);
            const partial = hasMatches && !played && byDate[label].some(m=>scores[m.id]?.h!=null);
            const isSelected = selectedDate === label;
            const isToday = label === todayLabel;
            const bg = isSelected ? C.gold
              : played ? C.greenDim
              : partial ? C.amberDim
              : hasMatches ? C.goldDim
              : "transparent";
            const col = isSelected ? "#000"
              : played ? C.greenBright
              : hasMatches ? C.gold
              : C.dim;
            return (
              <div key={day} onClick={() => hasMatches && setSelectedDate(label)}
                style={{
                  textAlign:"center", padding:"5px 2px",
                  borderRadius:5, fontSize:12, fontWeight:hasMatches?700:400,
                  background:bg, color:col,
                  cursor:hasMatches?"pointer":"default",
                  border:`1px solid ${isSelected?C.gold:hasMatches?C.goldDim:"transparent"}`,
                  position:"relative",
                  outline: isToday ? `1px solid ${C.muted}` : "none",
                  transition:"background 0.1s",
                }}>
                {day}
                {hasMatches && (
                  <div style={{
                    position:"absolute", bottom:1, left:"50%", transform:"translateX(-50%)",
                    width:4, height:4, borderRadius:"50%",
                    background: isSelected?"#000":played?C.greenBright:C.gold,
                  }}/>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  const dayMatches = byDate[selectedDate] || [];
  const totalOnDay = dayMatches.length;
  const playedOnDay = dayMatches.filter(m=>scores[m.id]?.h!=null).length;

  return (
    <div>
      {/* Calendar grids */}
      <div style={{
        background:C.card, border:`1px solid ${C.border}`,
        borderRadius:8, padding:"14px 16px", marginBottom:16,
      }}>
        <div style={{display:"flex", gap:24, flexWrap:"wrap"}}>
          <MonthGrid monthName="June" year={2026} numDays={30} monthIndex={5} prefix="Jun"/>
          <div style={{width:1, background:C.border, flexShrink:0}}/>
          <MonthGrid monthName="July" year={2026} numDays={19} monthIndex={6} prefix="Jul"/>
        </div>
        <div style={{marginTop:10,display:"flex",gap:16,flexWrap:"wrap",fontSize:10,color:C.muted}}>
          <span><span style={{color:C.gold}}>●</span> Match day</span>
          <span><span style={{color:C.greenBright}}>●</span> All scores entered</span>
          <span><span style={{color:C.amber}}>●</span> Partially scored</span>
          <span style={{color:C.dim}}>Click a highlighted date to see its fixtures</span>
        </div>
      </div>

      {/* Selected day fixtures */}
      <div>
        <div style={{
          fontSize:13, fontWeight:800, letterSpacing:"0.08em",
          color:C.gold, padding:"6px 12px",
          borderLeft:`3px solid ${C.gold}`,
          background:C.card, marginBottom:10,
          display:"flex", alignItems:"center", justifyContent:"space-between",
        }}>
          <span>{selectedDate.toUpperCase()} — {totalOnDay} MATCH{totalOnDay!==1?"ES":""}</span>
          {totalOnDay>0 && (
            <span style={{fontSize:10,fontWeight:400,color:C.muted}}>
              {playedOnDay}/{totalOnDay} scored
            </span>
          )}
        </div>
        {dayMatches.length > 0 ? (
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {dayMatches.map(m=><MatchRow key={m.id} m={m} scores={scores} onSave={onSave}/>)}
          </div>
        ) : (
          <div style={{
            background:C.card, border:`1px solid ${C.border}`,
            borderRadius:6, padding:"24px", textAlign:"center",
            color:C.muted, fontSize:12,
          }}>
            No group stage matches on this date. Select a highlighted date above.
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════

function App() {
  const isMobile = useIsMobile();
  const [scores, setScores] = useState(()=>{
    try{ const s=localStorage.getItem(STORAGE_KEY); return s?JSON.parse(s):{}; }catch{return {};}
  });
  const [koScores, setKoScores] = useState(()=>{
    try{ const s=localStorage.getItem(KO_STORAGE_KEY); return s?JSON.parse(s):{}; }catch{return {};}
  });
  const [tab, setTab] = useState("wallchart");
  const [groupFilter, setGroupFilter] = useState("ALL");
  const [liveSync, setLiveSync] = useState({
    loading:false,
    message:formatLastSync(localStorage.getItem(LIVE_SCORE_CACHE_KEY)),
    error:false,
    auto:true
  });

  async function syncLiveScores({silent=false} = {}) {
    if (!silent) setLiveSync(prev => ({...prev, loading:true, error:false, message:"Checking for final scores…"}));
    try {
      const res = await fetch(`${LIVE_SCORE_API_URL}&_=${Date.now()}`, {cache:"no-store"});
      if (!res.ok) throw new Error(`API returned ${res.status}`);
      const data = await res.json();
      const events = Array.isArray(data?.events) ? data.events : [];
      const updates = {};
      let matched = 0;
      let reversed = 0;

      events.forEach(event => {
        const rawHome = event.strHomeTeam;
        const rawAway = event.strAwayTeam;
        const hs = event.intHomeScore;
        const as = event.intAwayScore;
        if (hs == null || as == null || hs === "" || as === "") return;

        const match = findFixtureByTeams(rawHome, rawAway);
        if (!match) return;

        const apiHome = normalizeTeamName(rawHome);
        const fileHome = normalizeTeamName(match.home);
        const isReversed = apiHome !== fileHome;
        updates[match.id] = isReversed
          ? {h:Number(as), a:Number(hs), source:"live"}
          : {h:Number(hs), a:Number(as), source:"live"};
        matched++;
        if (isReversed) reversed++;
      });

      if (matched > 0) setScores(prev => ({...prev, ...updates}));

      const ts = new Date().toISOString();
      localStorage.setItem(LIVE_SCORE_CACHE_KEY, ts);
      const msg = matched > 0
        ? `Synced ${matched} final score${matched===1?"":"s"}${reversed ? ` (${reversed} reversed-team match${reversed===1?"":"es"} corrected)` : ""}. ${formatLastSync(ts)}`
        : `No completed scores found yet. ${formatLastSync(ts)}`;
      setLiveSync(prev => ({...prev, loading:false, error:false, message:msg}));
    } catch (err) {
      setLiveSync(prev => ({
        ...prev,
        loading:false,
        error:true,
        message:`Live sync failed: ${err.message}. You can still enter scores manually.`
      }));
    }
  }

  useEffect(()=>{
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(scores)); }catch{}
  },[scores]);
  useEffect(()=>{
    try{ localStorage.setItem(KO_STORAGE_KEY, JSON.stringify(koScores)); }catch{}
  },[koScores]);

  // Optional lightweight polling while the page is open.
  useEffect(()=>{
    if (!liveSync.auto) return;
    syncLiveScores({silent:true});
    const id = setInterval(() => syncLiveScores({silent:true}), 5 * 60 * 1000);
    return () => clearInterval(id);
  },[liveSync.auto]);

  const saveGroupScore = useCallback((id,h,a) => {
    setScores(prev => a==null ? (()=>{const n={...prev}; delete n[id]; return n;})() : {...prev,[id]:{h,a}});
  },[]);

  const saveKoScore = useCallback((id,h,a) => {
    setKoScores(prev => a==null ? (()=>{const n={...prev}; delete n[id]; return n;})() : {...prev,[id]:{h,a}});
  },[]);

  // Merge all scores for display
  const allScores = {...scores, ...koScores};

  const ko = predictKO(scores);
  const allSt = getAllStandings(scores);

  // Stats
  const played = GROUP_FIXTURES.filter(m=>scores[m.id]?.h!=null).length;
  const goals = GROUP_FIXTURES.reduce((s,m)=>{
    const sc=scores[m.id]; return sc&&sc.h!=null ? s+sc.h+sc.a : s;
  },0);

  const tabBtn = (key,label) => (
    <button onClick={()=>setTab(key)} style={{
      padding:"8px 16px", border:"none",
      background:tab===key?"#9a6f00":"transparent",
      color:tab===key?"#fff":C.muted,
      fontWeight:tab===key?800:500, cursor:"pointer",
      fontSize:12, letterSpacing:"0.06em", textTransform:"uppercase",
      fontFamily:"inherit",
      borderBottom:tab===key?"none":`2px solid transparent`,
      transition:"all 0.15s",
    }}>{label}</button>
  );

  const groups = "ABCDEFGHIJKL".split("");
  const filteredGroups = groupFilter==="ALL" ? groups : [groupFilter];

  return(
    <div style={{minHeight:"100vh", background:C.bg, color:C.text, fontFamily:"'Inter','Helvetica Neue',system-ui,sans-serif"}}>

      {/* MASTHEAD */}
      <div style={{background:C.card, borderBottom:`2px solid ${C.gold}`, padding:isMobile?"14px 12px":"14px 20px"}}>
        <div style={{maxWidth:1300, margin:"0 auto", display:"flex", alignItems:isMobile?"stretch":"center", justifyContent:"space-between", flexWrap:"wrap", gap:isMobile?14:10, flexDirection:isMobile?"column":"row"}}>
          <div>
            <div style={{
              fontSize:isMobile?20:22, fontWeight:900, letterSpacing:"0.04em",
              color:C.gold, lineHeight:1,
            }}>FIFA WORLD CUP 2026</div>
            <div style={{fontSize:11,color:C.muted,marginTop:3,letterSpacing:"0.06em"}}>
              USA · CANADA · MEXICO &nbsp;·&nbsp; 11 JUNE – 19 JULY &nbsp;·&nbsp; 48 TEAMS · 104 MATCHES
            </div>
          </div>
          <div style={{display:"flex",gap:isMobile?12:16,alignItems:"center",flexWrap:"wrap",justifyContent:isMobile?"space-between":"flex-end"}}>
            {[
              [`${played}/72`, "Played"],
              [`${goals}`, "Goals"],
              [played>0?(goals/played).toFixed(2):"—","per game"],
            ].map(([v,l])=>(
              <div key={l} style={{textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:900,color:C.gold}}>{v}</div>
                <div style={{fontSize:10,color:C.muted,letterSpacing:"0.06em"}}>{l.toUpperCase()}</div>
              </div>
            ))}
            <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:isMobile?"stretch":"flex-end",minWidth:isMobile?"100%":210}}>
              <button onClick={()=>syncLiveScores()} disabled={liveSync.loading} style={{
                background:liveSync.loading?C.border:C.gold,
                color:liveSync.loading?C.muted:"#fff",
                border:"none",borderRadius:6,padding:isMobile?"11px 12px":"6px 10px",
                cursor:liveSync.loading?"wait":"pointer",fontSize:11,
                fontWeight:800,letterSpacing:"0.06em",fontFamily:"inherit",
                textTransform:"uppercase"
              }}>{liveSync.loading?"Syncing…":"Sync Live Scores"}</button>
              <label style={{fontSize:10,color:C.muted,display:"flex",gap:5,alignItems:"center",cursor:"pointer"}}>
                <input type="checkbox" checked={liveSync.auto} onChange={e=>setLiveSync(prev=>({...prev,auto:e.target.checked}))}/>
                Auto-sync every 5 min
              </label>
              <div style={{fontSize:10,color:liveSync.error?C.red:C.muted,textAlign:"right",maxWidth:320,lineHeight:1.3}}>
                {liveSync.message}
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* TAB BAR */}
      <div style={{background:C.bg, borderBottom:`1px solid ${C.border}`, padding:isMobile?"0 8px":"0 20px", display:"flex", overflowX:"auto", WebkitOverflowScrolling:"touch"}}>
        <div style={{maxWidth:1300, margin:"0 auto", display:"flex", gap:0}}>
          {tabBtn("wallchart","Wall Chart")}
          {tabBtn("schedule","Schedule")}
          {tabBtn("calendar","Calendar")}
          {tabBtn("standings","Standings")}
          {tabBtn("bracket","Bracket")}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{maxWidth:1300, margin:"0 auto", padding:isMobile?"12px 8px":"16px 14px"}}>

        {/* ── WALL CHART TAB ── */}
        {tab==="wallchart"&&(
          <div>
            {/* Group filter pills */}
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
              <span style={{fontSize:11,color:C.muted,marginRight:4,letterSpacing:"0.06em"}}>SHOW:</span>
              {["ALL",...groups].map(g=>(
                <button key={g} onClick={()=>setGroupFilter(g)} style={{
                  padding:isMobile?"8px 12px":"3px 10px", borderRadius:20,
                  border:`1px solid ${groupFilter===g?C.gold:C.border}`,
                  background:groupFilter===g?C.goldDim:"transparent",
                  color:groupFilter===g?C.gold:C.muted,
                  fontSize:11, cursor:"pointer", fontFamily:"inherit",
                }}>{g==="ALL"?"All Groups":`Group ${g}`}</button>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(600px,1fr))",gap:isMobile?12:10}}>
              {filteredGroups.map(g=>(
                <GroupPanel key={g} group={g} standings={allSt[g]} scores={scores} onSave={saveGroupScore}/>
              ))}
            </div>
          </div>
        )}

        {/* ── SCHEDULE TAB ── */}
        {tab==="schedule"&&(
          <ScheduleList scores={scores} onSave={saveGroupScore}/>
        )}

        {/* ── CALENDAR TAB ── */}
        {tab==="calendar"&&(
          <CalendarTab scores={scores} onSave={saveGroupScore}/>
        )}

        {/* ── STANDINGS TAB ── */}
        {tab==="standings"&&(
          <div>
            <div style={{fontSize:11,color:C.muted,marginBottom:12,lineHeight:1.6}}>
              <span style={{color:C.greenBright}}>■</span> Top 2 advance automatically to Round of 32 &nbsp;
              <span style={{color:C.amber}}>■</span> 3rd place — best 8 of 12 also advance &nbsp;
              Tiebreaker: Pts → GD → GF → Head-to-head → Fair play
            </div>
            <AllStandings scores={scores}/>
          </div>
        )}

        {/* ── BRACKET TAB ── */}
        {tab==="bracket"&&(
          <div>
            <div style={{
              background:C.card, border:`1px solid ${C.border}`,
              borderRadius:6, padding:"8px 12px", marginBottom:14,
              fontSize:11, color:C.muted, lineHeight:1.7,
            }}>
              <span style={{color:C.text,fontWeight:600}}>Live bracket prediction</span> — team slots marked with group codes (e.g. "1st A", "2nd B") automatically fill in from standings as you enter group scores.
              Knockout scores can be entered independently. <span style={{color:C.amber}}>❓</span> = slot not yet determined.
            </div>
            <BracketView scores={allScores} onSave={(id,h,a)=>{
              if(String(id).startsWith("ko_")) saveKoScore(id,h,a);
              else saveGroupScore(id,h,a);
            }} ko={ko}/>
          </div>
        )}

      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
